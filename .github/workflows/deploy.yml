# Simple workflow for deploying static content to Pages and Cloudflare
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: Build source code và đóng gói artifact
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Soundfonts
        run: |
          mkdir -p public/presets/instruments
          for file in MuseScore_General.sf3 Sonatina_Symphonic_Orchestra.sf3 FluidR3Mono_GM.sf3 Roland_SC-88.sf3; do
            curl -L -f -s -o public/presets/instruments/$file https://github.com/thichuong/SynthScore/releases/download/v1.0.0/$file || echo "Bỏ qua $file"
          done

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: ./dist
          retention-days: 1

  # Job 2: Deploy lên GitHub Pages
  deploy-github-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: ./dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact for Github Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Job 3: Deploy lên Cloudflare Pages
  deploy-cloudflare-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: ./dist

      - name: Remove assets exceeding Cloudflare Pages 25MB limit
        run: |
          if [ -d "./dist/presets/instruments" ]; then
            echo "Tìm và xóa các file nhạc cụ vượt quá giới hạn 25MB của Cloudflare Pages..."
            find ./dist/presets/instruments -type f -size +24M -print -delete
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'synthscore'
          directory: './dist'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
