<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none">
  <!-- Gradients & Filters -->
  <defs>
    <!-- Primary Gradient: Magenta to Purple -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF007F" />
      <stop offset="100%" stop-color="#7F00FF" />
    </linearGradient>
    
    <!-- Secondary Gradient: Cyan to Blue -->
    <linearGradient id="secondary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#007FFF" />
    </linearGradient>
    
    <!-- White Keys Gradient -->
    <linearGradient id="white-key-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#D5D5FF" />
    </linearGradient>

    <!-- Dark Keys Gradient -->
    <linearGradient id="dark-key-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2A38" />
      <stop offset="100%" stop-color="#0F0F16" />
    </linearGradient>

    <!-- Glow Filter for Cyberpunk effect -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Glows (Subtle, large soft circles) -->
  <circle cx="256" cy="256" r="160" fill="#7F00FF" opacity="0.15" filter="blur(40px)" />
  <circle cx="300" cy="200" r="120" fill="#00F0FF" opacity="0.1" filter="blur(30px)" />

  <!-- Staff Lines (Wavy Synthesizer waves in the background) -->
  <g opacity="0.4" stroke="url(#secondary-grad)" stroke-width="2.5" stroke-linecap="round">
    <!-- 5 wavy lines simulating sheet staff lines & audio waves -->
    <path d="M 60,180 C 140,140 220,220 300,180 C 380,140 420,180 452,180" />
    <path d="M 60,205 C 140,165 220,245 300,205 C 380,165 420,205 452,205" />
    <path d="M 60,230 C 140,190 220,270 300,230 C 380,190 420,230 452,230" />
    <path d="M 60,255 C 140,215 220,295 300,255 C 380,215 420,255 452,255" />
    <path d="M 60,280 C 140,240 220,320 300,280 C 380,240 420,280 452,280" />
  </g>

  <!-- Glowing Soundwave Ring encircling the note -->
  <path d="M 120,256 A 136,136 0 0,1 380,160" stroke="url(#secondary-grad)" stroke-width="4" stroke-linecap="round" filter="url(#glow-cyan)" opacity="0.8" />
  <path d="M 392,256 A 136,136 0 0,1 132,352" stroke="url(#primary-grad)" stroke-width="4" stroke-linecap="round" filter="url(#glow-magenta)" opacity="0.8" />

  <!-- Floating Falling Notes / MIDI bars (to represent the waterfall visualizer) -->
  <g opacity="0.85">
    <rect x="140" y="110" width="10" height="30" rx="5" fill="#00F0FF" filter="url(#glow-cyan)" />
    <rect x="360" y="280" width="10" height="40" rx="5" fill="#FF007F" filter="url(#glow-magenta)" />
    <rect x="320" y="90" width="8" height="25" rx="4" fill="#7F00FF" />
  </g>

  <!-- The Main Musical Note structure -->
  <!-- 1. The Wavy Stem -->
  <path d="M 252,325 C 235,260 210,210 240,160 C 255,135 248,112 250,96" 
        stroke="url(#primary-grad)" stroke-width="14" stroke-linecap="round" filter="url(#glow-magenta)" />

  <!-- 2. The Flag (Stylized Wave going to the right) -->
  <path d="M 250,96 C 300,105 345,145 320,200 C 298,240 260,200 248,175" 
        stroke="url(#primary-grad)" stroke-width="12" stroke-linecap="round" filter="url(#glow-magenta)" />

  <!-- 3. The Note Head: Stylized Piano Keyboard Slice -->
  <g transform="translate(162, 290) rotate(-18)">
    <!-- White Keys (3 keys) -->
    <!-- Key 1 -->
    <rect x="0" y="0" width="26" height="75" rx="5" fill="url(#white-key-grad)" stroke="#1a1a24" stroke-width="2" />
    <!-- Key 2 -->
    <rect x="28" y="0" width="26" height="75" rx="5" fill="url(#white-key-grad)" stroke="#1a1a24" stroke-width="2" />
    <!-- Key 3 -->
    <rect x="56" y="0" width="26" height="75" rx="5" fill="url(#white-key-grad)" stroke="#1a1a24" stroke-width="2" />
    
    <!-- Black Keys (2 keys in between) -->
    <rect x="18" y="-2" width="16" height="46" rx="3" fill="url(#dark-key-grad)" stroke="#00F0FF" stroke-width="1.5" filter="url(#glow-cyan)" />
    <rect x="46" y="-2" width="16" height="46" rx="3" fill="url(#dark-key-grad)" stroke="#00F0FF" stroke-width="1.5" filter="url(#glow-cyan)" />
  </g>
</svg>
