<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none">
  <!-- Gradients & Filters -->
  <defs>
    <!-- Primary Gradient: Magenta to Purple -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF007F" />
      <stop offset="100%" stop-color="#7F00FF" />
    </linearGradient>
    
    <!-- Secondary Gradient: Cyan to Blue -->
    <linearGradient id="secondary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#007FFF" />
    </linearGradient>
    
    <!-- White Keys Gradient -->
    <linearGradient id="white-key-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#D5D5FF" />
    </linearGradient>

    <!-- Dark Keys Gradient -->
    <linearGradient id="dark-key-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2A38" />
      <stop offset="100%" stop-color="#0F0F16" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Squircle for Favicon & App Icon -->
  <rect x="16" y="16" width="480" height="480" rx="110" fill="#09090e" stroke="url(#primary-grad)" stroke-width="12" />

  <!-- Background Glows -->
  <circle cx="256" cy="256" r="140" fill="#7F00FF" opacity="0.2" filter="blur(35px)" />
  <circle cx="300" cy="200" r="100" fill="#00F0FF" opacity="0.15" filter="blur(25px)" />

  <!-- Glowing Soundwave Ring -->
  <path d="M 120,256 A 136,136 0 0,1 380,160" stroke="url(#secondary-grad)" stroke-width="6" stroke-linecap="round" filter="url(#glow-cyan)" opacity="0.9" />
  <path d="M 392,256 A 136,136 0 0,1 132,352" stroke="url(#primary-grad)" stroke-width="6" stroke-linecap="round" filter="url(#glow-magenta)" opacity="0.9" />

  <!-- The Main Musical Note structure (Favicon optimized) -->
  <!-- 1. The Wavy Stem -->
  <path d="M 252,325 C 235,260 210,210 240,160 C 255,135 248,112 250,96" 
        stroke="url(#primary-grad)" stroke-width="16" stroke-linecap="round" filter="url(#glow-magenta)" />

  <!-- 2. The Flag (Stylized Wave) -->
  <path d="M 250,96 C 300,105 345,145 320,200 C 298,240 260,200 248,175" 
        stroke="url(#primary-grad)" stroke-width="14" stroke-linecap="round" filter="url(#glow-magenta)" />

  <!-- 3. The Note Head: Stylized Piano Keyboard Slice -->
  <g transform="translate(162, 290) rotate(-18)">
    <!-- White Keys (3 keys) -->
    <rect x="0" y="0" width="26" height="75" rx="5" fill="url(#white-key-grad)" stroke="#1a1a24" stroke-width="2.5" />
    <rect x="28" y="0" width="26" height="75" rx="5" fill="url(#white-key-grad)" stroke="#1a1a24" stroke-width="2.5" />
    <rect x="56" y="0" width="26" height="75" rx="5" fill="url(#white-key-grad)" stroke="#1a1a24" stroke-width="2.5" />
    
    <!-- Black Keys -->
    <rect x="18" y="-2" width="16" height="46" rx="3" fill="url(#dark-key-grad)" stroke="#00F0FF" stroke-width="1.8" filter="url(#glow-cyan)" />
    <rect x="46" y="-2" width="16" height="46" rx="3" fill="url(#dark-key-grad)" stroke="#00F0FF" stroke-width="1.8" filter="url(#glow-cyan)" />
  </g>
</svg>